<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI &amp; Crypto Daily — живая лента новостей</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>AI &amp; Crypto Daily</h1>
      <p class="subtitle">
        Русскоязычный дашборд новостей AI и крипты · обновляется ежедневно в 08:00 MSK ·
        <a href="./archive.html" style="color:var(--accent);">Архив и поиск →</a>
      </p>
    </div>
  </header>

  <nav class="category-tabs container" id="category-tabs" aria-label="Раздел">
    <button class="category-tab active" data-category="all">Всё</button>
    <button class="category-tab" data-category="ai">🤖 AI</button>
    <button class="category-tab" data-category="crypto">₿ Crypto</button>
  </nav>

  <nav class="filters container" id="filters" aria-label="Фильтр по теме">
    <span class="filter-label">Тема:</span>
    <button class="filter-btn active" data-topic="all">Все</button>
    <!-- Кнопки тем добавляются динамически в зависимости от выбранной категории -->
  </nav>

  <nav class="filters container" id="source-filters" aria-label="Фильтр по источнику">
    <span class="filter-label">Источник:</span>
    <button class="filter-btn active" data-source="all">Все</button>
    <!-- остальные кнопки добавятся динамически из latest.json -->
  </nav>

  <section class="container search-block">
    <input id="search" type="search" placeholder="Поиск по текущей ленте…" autocomplete="off" />
  </section>

  <main class="container">
    <div id="meta" class="meta"></div>
    <div id="news-list" class="news-list">
      <p class="empty">Загружаю новости…</p>
    </div>
  </main>

  <footer class="footer container">
    <p>Источник кода: <a href="https://github.com/Cinderella789/ai-daily">github.com/Cinderella789/ai-daily</a> · <a href="./bot/">📊 Дашборд бота</a></p>
    <p class="footer-note">Некоторые источники могут быть недоступны из РФ без VPN</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
