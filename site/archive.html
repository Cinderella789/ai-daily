<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI &amp; Crypto Daily — архив и поиск</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>AI &amp; Crypto Daily — архив</h1>
      <p class="subtitle">
        Поиск по всем материалам ·
        <a href="./" style="color:var(--accent);">← на главную</a>
      </p>
    </div>
  </header>

  <section class="container search-block">
    <input id="search" type="search" placeholder="Поиск по заголовку и описанию…" autocomplete="off" />
    <div class="filter-row">
      <select id="category-filter">
        <option value="all">Все разделы</option>
        <option value="ai">🤖 AI</option>
        <option value="crypto">₿ Crypto</option>
      </select>
      <select id="topic-filter">
        <option value="all">Все темы</option>
      </select>
      <select id="source-filter">
        <option value="all">Все источники</option>
      </select>
      <select id="period-filter">
        <option value="all">Всё время</option>
        <option value="1">Последние 24ч</option>
        <option value="7">Последние 7 дней</option>
        <option value="30">Последние 30 дней</option>
      </select>
    </div>
  </section>

  <main class="container">
    <div id="meta" class="meta"></div>
    <div id="news-list" class="news-list">
      <p class="empty">Загружаю архив…</p>
    </div>
    <div id="pager" class="pager"></div>
  </main>

  <footer class="footer container">
    <p>Источник кода: <a href="https://github.com/Cinderella789/ai-daily">github.com/Cinderella789/ai-daily</a></p>
    <p class="footer-note">Некоторые источники могут быть недоступны из РФ без VPN</p>
  </footer>

  <script src="archive.js"></script>
</body>
</html>
