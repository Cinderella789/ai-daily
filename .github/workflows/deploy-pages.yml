name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/latest.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble static bundle
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/data
          cp data/latest.json _site/data/latest.json

      - name: Patch app.js — fetch from /data, not ../data
        run: |
          sed -i 's|"../data/latest.json"|"./data/latest.json"|g' _site/app.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
