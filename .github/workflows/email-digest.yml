name: email-digest

on:
  # Cron переехал на личный сервер (см. update-news.yml).
  # Рассылка идёт из ~/ai-daily/run-digest.sh в 09:00 MSK.
  workflow_dispatch:
    inputs:
      force:
        description: "Принудительно отправить, игнорируя защёлку"
        required: false
        default: "false"

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          DIGEST_FROM_NAME: AI Daily
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            python scripts/build_digest.py --force
          else
            python scripts/build_digest.py
          fi

      - name: Commit lock file
        run: |
          git config user.name  "ai-daily-bot"
          git config user.email "ai-daily-bot@users.noreply.github.com"
          git add data/.last-digest-date.txt
          git diff --cached --quiet || git commit -m "chore: digest sent $(date -u +%FT%TZ)"
          git pull --rebase origin main || true
          git push || true
