name: update-news

on:
  schedule:
    # 08:00 MSK = 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch RSS + arXiv
        run: python scripts/fetch_feeds.py

      - name: Classify by topic
        run: python scripts/classify_news.py

      - name: Translate (OpenAI)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
        run: python scripts/translate_news.py

      - name: Semantic deduplication (OpenAI embeddings)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/dedup_news.py

      - name: Mirror latest.json into site/data
        run: |
          mkdir -p site/data
          cp data/latest.json site/data/latest.json

      - name: Append to archive
        run: python scripts/append_archive.py

      - name: Commit refreshed data
        run: |
          git config user.name  "ai-daily-bot"
          git config user.email "ai-daily-bot@users.noreply.github.com"
          git add data/latest.json site/data/latest.json data/archive.json site/data/archive.json cache/.translation-cache.json cache/.embeddings-cache.json
          git diff --cached --quiet || git commit -m "chore: refresh news $(date -u +%FT%TZ)"
          git push
